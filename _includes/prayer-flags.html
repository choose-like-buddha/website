<!-- Decorative prayer flags (lung ta). Purely ornamental.
     Authentic Tibetan square flags in the traditional five colors (blue,
     white, red, green, yellow) hung from a static string that swags (hangs)
     between the top corners. The string is fixed; each flag flutters
     independently (staggered) like wind. Each carries a short Buddhist saying. -->
<div
  class="hidden md:block pointer-events-none select-none absolute -top-[7px] left-0 w-80 lg:w-96 z-0 origin-top-left"
  aria-hidden="true"
>
  <svg
    viewBox="0 0 320 128"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
    font-family="'Roboto', ui-sans-serif, sans-serif"
  >
    <defs>
      <filter id="pf-shadow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow
          dx="0"
          dy="1.5"
          stdDeviation="2"
          flood-color="#2d4aaa"
          flood-opacity="0.18"
        />
      </filter>
    </defs>

    <!-- static twine string: hangs (sags) between the top corners; ends run
         off-frame so no stub shows -->
    <path
      d="M-22 -5 L2 8 Q160 92 318 8 L342 -5"
      stroke="#dfe2ea"
      stroke-width="1.4"
      stroke-linecap="round"
    />

    <!-- blue — "Peace comes from within" -->
    <g class="pf-flag" style="animation-duration: 4s; animation-delay: -0.2s">
      <rect x="18" y="26" width="44" height="44" fill="#2c3fa3" filter="url(#pf-shadow)" />
      <rect x="21" y="29" width="38" height="38" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="0.7" />
      <g fill="#ffffff" fill-opacity="0.45">
        <circle cx="21" cy="29" r="1.1" />
        <circle cx="59" cy="29" r="1.1" />
        <circle cx="21" cy="67" r="1.1" />
        <circle cx="59" cy="67" r="1.1" />
      </g>
      <text text-anchor="middle" font-size="6" font-weight="500" fill="#ffffff">
        <tspan x="40" y="40.5">Peace</tspan>
        <tspan x="40" y="48">comes from</tspan>
        <tspan x="40" y="55.5">within</tspan>
      </text>
    </g>

    <!-- white — "What we think we become" -->
    <g class="pf-flag" style="animation-duration: 4.6s; animation-delay: -1.1s">
      <rect x="78" y="44" width="44" height="44" fill="#f4f1e8" filter="url(#pf-shadow)" />
      <rect x="81" y="47" width="38" height="38" fill="none" stroke="#6b6456" stroke-opacity="0.4" stroke-width="0.7" />
      <g fill="#6b6456" fill-opacity="0.45">
        <circle cx="81" cy="47" r="1.1" />
        <circle cx="119" cy="47" r="1.1" />
        <circle cx="81" cy="85" r="1.1" />
        <circle cx="119" cy="85" r="1.1" />
      </g>
      <text text-anchor="middle" font-size="6" font-weight="500" fill="#3a3a3a">
        <tspan x="100" y="58.5">What we</tspan>
        <tspan x="100" y="66">think we</tspan>
        <tspan x="100" y="73.5">become</tspan>
      </text>
    </g>

    <!-- red — "Be your own light" -->
    <g class="pf-flag" style="animation-duration: 3.8s; animation-delay: -0.6s">
      <rect x="138" y="50" width="44" height="44" fill="#d62828" filter="url(#pf-shadow)" />
      <rect x="141" y="53" width="38" height="38" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="0.7" />
      <g fill="#ffffff" fill-opacity="0.45">
        <circle cx="141" cy="53" r="1.1" />
        <circle cx="179" cy="53" r="1.1" />
        <circle cx="141" cy="91" r="1.1" />
        <circle cx="179" cy="91" r="1.1" />
      </g>
      <text text-anchor="middle" font-size="6" font-weight="500" fill="#ffffff">
        <tspan x="160" y="64.5">Be your</tspan>
        <tspan x="160" y="72">own</tspan>
        <tspan x="160" y="79.5">light</tspan>
      </text>
    </g>

    <!-- green — "Hatred ceases by love" -->
    <g class="pf-flag" style="animation-duration: 4.3s; animation-delay: -1.6s">
      <rect x="198" y="44" width="44" height="44" fill="#4a9d3f" filter="url(#pf-shadow)" />
      <rect x="201" y="47" width="38" height="38" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="0.7" />
      <g fill="#ffffff" fill-opacity="0.45">
        <circle cx="201" cy="47" r="1.1" />
        <circle cx="239" cy="47" r="1.1" />
        <circle cx="201" cy="85" r="1.1" />
        <circle cx="239" cy="85" r="1.1" />
      </g>
      <text text-anchor="middle" font-size="6" font-weight="500" fill="#ffffff">
        <tspan x="220" y="58.5">Hatred</tspan>
        <tspan x="220" y="66">ceases</tspan>
        <tspan x="220" y="73.5">by love</tspan>
      </text>
    </g>

    <!-- yellow — "Radiate boundless love" -->
    <g class="pf-flag" style="animation-duration: 4.1s; animation-delay: -0.9s">
      <rect x="258" y="26" width="44" height="44" fill="#f4c518" filter="url(#pf-shadow)" />
      <rect x="261" y="29" width="38" height="38" fill="none" stroke="#5a4a10" stroke-opacity="0.4" stroke-width="0.7" />
      <g fill="#5a4a10" fill-opacity="0.5">
        <circle cx="261" cy="29" r="1.1" />
        <circle cx="299" cy="29" r="1.1" />
        <circle cx="261" cy="67" r="1.1" />
        <circle cx="299" cy="67" r="1.1" />
      </g>
      <text text-anchor="middle" font-size="5.6" font-weight="500" fill="#5a4a10">
        <tspan x="280" y="40.5">Radiate</tspan>
        <tspan x="280" y="48">boundless</tspan>
        <tspan x="280" y="55.5">love</tspan>
      </text>
    </g>
  </svg>
</div>
