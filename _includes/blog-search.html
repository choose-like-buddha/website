{%- comment -%}
  Client-side blog search as a typeahead dropdown.
  The host page's grid is not affected. Clicking a result navigates to the post.
{%- endcomment -%}

<div class="max-w-xl mx-auto mb-8 relative" id="blog-search-root">
  <label for="blog-search" class="sr-only">Search posts</label>
  <div class="relative">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-body/50 pointer-events-none"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="7" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input
      id="blog-search"
      type="search"
      autocomplete="off"
      placeholder="Search posts..."
      role="combobox"
      aria-expanded="false"
      aria-controls="blog-search-dropdown"
      aria-autocomplete="list"
      class="w-full bg-white rounded-full shadow-card pl-11 pr-11 py-3 text-dark placeholder:text-body/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition"
    />
    <button
      type="button"
      id="blog-search-clear"
      aria-label="Clear search"
      class="hidden absolute right-3 top-1/2 -translate-y-1/2 p-1 text-body/50 hover:text-dark transition"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <div
    id="blog-search-dropdown"
    role="listbox"
    class="hidden absolute left-0 right-0 top-full mt-2 bg-white rounded-2xl shadow-card border border-stroke max-h-96 overflow-y-auto z-20"
  ></div>
</div>

<script>
  (function () {
    var root = document.getElementById("blog-search-root");
    var input = document.getElementById("blog-search");
    var clearBtn = document.getElementById("blog-search-clear");
    var dropdown = document.getElementById("blog-search-dropdown");
    if (!root || !input || !dropdown) return;

    var MAX_RESULTS = 8;
    var activeIndex = -1;

    var indexPromise = null;
    function loadIndex() {
      if (!indexPromise) {
        indexPromise = fetch("{{ '/search.json' | relative_url }}")
          .then(function (r) { return r.json(); })
          .catch(function () { return []; });
      }
      return indexPromise;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function open() {
      dropdown.classList.remove("hidden");
      input.setAttribute("aria-expanded", "true");
    }

    function close() {
      dropdown.classList.add("hidden");
      input.setAttribute("aria-expanded", "false");
      activeIndex = -1;
    }

    function render(matches, query) {
      activeIndex = -1;

      if (matches.length === 0) {
        dropdown.innerHTML =
          '<div class="px-5 py-4 text-body text-sm">No posts match &ldquo;' +
          escapeHtml(query) +
          '&rdquo;.</div>';
        open();
        return;
      }

      dropdown.innerHTML = matches
        .map(function (post, i) {
          return (
            '<a href="' + escapeHtml(post.url) + '" ' +
            'role="option" data-index="' + i + '" ' +
            'class="block px-5 py-3 border-b border-stroke last:border-b-0 hover:bg-gray-bg transition">' +
              '<div class="text-dark font-medium text-sm leading-snug">' +
                escapeHtml(post.title) +
              '</div>' +
              '<div class="text-body text-xs mt-1 line-clamp-1">' +
                escapeHtml(post.description || "") +
              '</div>' +
            '</a>'
          );
        })
        .join("");
      open();
    }

    function filter(query, posts) {
      var q = query.trim().toLowerCase();
      if (!q) return [];
      var terms = q.split(/\s+/);
      var matches = [];
      for (var i = 0; i < posts.length && matches.length < MAX_RESULTS; i++) {
        var post = posts[i];
        var hay = (
          (post.title || "") + " " + (post.description || "")
        ).toLowerCase();
        var ok = true;
        for (var j = 0; j < terms.length; j++) {
          if (hay.indexOf(terms[j]) === -1) { ok = false; break; }
        }
        if (ok) matches.push(post);
      }
      return matches;
    }

    function update() {
      var q = input.value;
      if (q.trim() === "") {
        close();
        clearBtn.classList.add("hidden");
        return;
      }
      clearBtn.classList.remove("hidden");
      loadIndex().then(function (posts) {
        if (input.value !== q) return;
        render(filter(q, posts), q);
      });
    }

    function setActive(idx) {
      var items = dropdown.querySelectorAll('[role="option"]');
      if (items.length === 0) return;
      activeIndex = (idx + items.length) % items.length;
      items.forEach(function (el, i) {
        if (i === activeIndex) {
          el.classList.add("bg-gray-bg");
          el.scrollIntoView({ block: "nearest" });
        } else {
          el.classList.remove("bg-gray-bg");
        }
      });
    }

    input.addEventListener("input", update);
    input.addEventListener("focus", function () {
      loadIndex();
      if (input.value.trim() !== "") update();
    });
    input.addEventListener("keydown", function (e) {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (dropdown.classList.contains("hidden")) update();
        else setActive(activeIndex + 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        setActive(activeIndex - 1);
      } else if (e.key === "Enter") {
        var items = dropdown.querySelectorAll('[role="option"]');
        if (activeIndex >= 0 && items[activeIndex]) {
          e.preventDefault();
          window.location.href = items[activeIndex].getAttribute("href");
        }
      } else if (e.key === "Escape") {
        close();
        input.blur();
      }
    });

    clearBtn.addEventListener("click", function () {
      input.value = "";
      input.focus();
      update();
    });

    document.addEventListener("click", function (e) {
      if (!root.contains(e.target)) close();
    });
  })();
</script>
