<meta charset="utf-8" />
<meta http-equiv="x-ua-compatible" content="ie=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

{% if page.title %}
<title>{{ page.title }} — {{ site.page_title }}</title>
{% else %}
<title>{{ site.page_title }}</title>
{% endif %}

<link rel="shortcut icon" href="{{ site.app_icon | relative_url }}" />

{% if site.enable_smart_app_banner %}
<meta name="apple-itunes-app" content="app-id={{ site.ios_app_id }}" />
{% endif %} {% feed_meta %} {% seo %}

<meta
  name="twitter:description"
  content="{{ page.description | default: site.app_description }}"
/>

<meta name="p:domain_verify" content="d0677dd3e6abb0d0b4272167cfee2243" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
  rel="stylesheet"
/>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="{{ '/assets/css/output.css' | relative_url }}" />

<meta name="zoomment" content="65e5027029aeb252fcaae656" />

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MobileApplication",
    "name": "{{ site.app_name }}",
    "description": "{{ site.app_description | strip_html | strip_newlines }}",
    "operatingSystem": "iOS, Android",
    "applicationCategory": "LifestyleApplication",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "installUrl": ["{{ site.appstore_link }}", "{{ site.playstore_link }}"],
    "image": "{{ site.app_icon | absolute_url }}"
  }
</script>

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "{{ site.title }}",
    "url": "{{ site.url }}",
    "logo": "{{ site.app_icon | absolute_url }}",
    "sameAs": [
      "https://twitter.com/ChooseBuddha",
      "https://www.tiktok.com/@choose.like.buddha",
      "https://www.pinterest.com/chooselikebuddha",
      "https://www.producthunt.com/products/choose-like-buddha"
    ]
  }
</script>

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.title }}",
    "url": "{{ site.url }}",
    "description": "{{ site.description | strip_html | strip_newlines }}",
    "inLanguage": "en"
  }
</script>

{% if page.layout == "post" %}
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | default: site.description | jsonify }},
    "image": "{{ page.image | default: site.image | absolute_url }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Organization",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "{{ site.title }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.app_icon | absolute_url }}"
      }
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
</script>

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ site.url }}/"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "Blog",
        "item": "{{ site.url }}/blog/"
      },
      {
        "@type": "ListItem",
        "position": 3,
        "name": {{ page.title | jsonify }},
        "item": "{{ page.url | absolute_url }}"
      }
    ]
  }
</script>
{% endif %}
