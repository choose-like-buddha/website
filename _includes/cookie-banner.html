<!-- Cookie Consent Banner -->
<div id="cookie-banner" class="fixed bottom-0 inset-x-0 z-50 p-4 transition-all duration-300 translate-y-full" style="display: none;">
  <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-card border border-stroke p-5">
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
      <div class="flex-1">
        <p class="text-sm text-body">
          <span class="text-lg mr-1">🍪</span>
          We use cookies to analyze site usage and improve your experience. By clicking "Accept", you consent to our use of analytics cookies.
        </p>
      </div>
      <div class="flex gap-3 shrink-0">
        <button id="cookie-decline" class="px-4 py-2 text-sm font-medium text-body bg-gray-bg hover:bg-stroke rounded-lg transition">
          Decline
        </button>
        <button id="cookie-accept" class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primary-dark rounded-lg transition">
          Accept
        </button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
    var COOKIE_NAME = 'cookie_consent';
    var CONSENT_DURATION = 365;

    function getCookie(name) {
        var value = "; " + document.cookie;
        var parts = value.split("; " + name + "=");
        if (parts.length === 2) return parts.pop().split(";").shift();
        return null;
    }

    function setCookie(name, value, days) {
        var expires = "";
        if (days) {
            var date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Lax";
    }

    function loadPostHog() {
        !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.crossOrigin="anonymous",p.async=!0,p.src=s.api_host.replace(".i.posthog.com","-assets.i.posthog.com")+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="init capture register register_once register_for_session unregister unregister_for_session getFeatureFlag getFeatureFlagPayload isFeatureEnabled reloadFeatureFlags updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures on onFeatureFlags onSessionId getSurveys getActiveMatchingSurveys renderSurvey canRenderSurvey getNextSurveyStep identify setPersonProperties group resetGroups setPersonPropertiesForFlags resetPersonPropertiesForFlags setGroupPropertiesForFlags resetGroupPropertiesForFlags reset get_distinct_id getGroups get_session_id get_session_replay_url alias set_config startSessionRecording stopSessionRecording sessionRecordingStarted captureException loadToolbar get_property getSessionProperty createPersonProfile opt_in_capturing opt_out_capturing has_opted_in_capturing has_opted_out_capturing clear_opt_in_out_capturing debug".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);
        posthog.init('phc_RYCteiKgR4ol3hVqRYSq2BKeGetgeSWhLmxA9mKK29f',{api_host:'https://eu.i.posthog.com', defaults:'2026-01-30'})
    }

    function showBanner() {
        var banner = document.getElementById('cookie-banner');
        if (banner) {
            banner.style.display = 'block';
            setTimeout(function() {
                banner.classList.remove('translate-y-full');
                banner.classList.add('translate-y-0');
            }, 100);
        }
    }

    function hideBanner() {
        var banner = document.getElementById('cookie-banner');
        if (banner) {
            banner.classList.remove('translate-y-0');
            banner.classList.add('translate-y-full');
            setTimeout(function() {
                banner.style.display = 'none';
            }, 300);
        }
    }

    function handleAccept() {
        setCookie(COOKIE_NAME, 'accepted', CONSENT_DURATION);
        hideBanner();
        loadPostHog();
    }

    function handleDecline() {
        setCookie(COOKIE_NAME, 'declined', CONSENT_DURATION);
        hideBanner();
    }

    document.addEventListener('DOMContentLoaded', function() {
        var consent = getCookie(COOKIE_NAME);
        if (consent === 'accepted') {
            loadPostHog();
        } else if (consent === null) {
            showBanner();
        }
        var acceptBtn = document.getElementById('cookie-accept');
        var declineBtn = document.getElementById('cookie-decline');
        if (acceptBtn) acceptBtn.addEventListener('click', handleAccept);
        if (declineBtn) declineBtn.addEventListener('click', handleDecline);
    });
})();
</script>
