<header
  class="bg-white/95 backdrop-blur-sm sticky top-0 z-50 border-b border-stroke"
>
  <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-18">
      <!-- Logo -->
      <a
        href="{{ '/' | relative_url }}"
        class="flex items-center gap-3 hover:opacity-80 transition"
      >
        <img
          src="{{ site.app_icon | relative_url }}"
          alt="{{ site.app_name }}"
          class="w-10 h-10 rounded-xl"
        />
        <span class="text-lg font-bold text-dark">{{ site.app_name }}</span>
      </a>

      <!-- Mobile menu button -->
      <button
        id="menu-toggle"
        aria-label="Menu"
        class="md:hidden p-2 rounded-md text-body hover:text-primary focus:outline-none"
      >
        <svg
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            id="menu-icon-open"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
          <path
            id="menu-icon-close"
            class="hidden"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center space-x-8">
        <a
          href="{{ '/blog/' | relative_url }}"
          class="text-base font-normal text-body hover:text-primary transition"
          >Blog</a
        >
        <a
          href="{{ '/changelog/' | relative_url }}"
          class="text-base font-normal text-body hover:text-primary transition"
          >What's New</a
        >
        <a
          href="{{ '/about/' | relative_url }}"
          class="text-base font-normal text-body hover:text-primary transition"
          >About</a
        >
      </div>
    </div>

    <!-- Mobile nav -->
    <div id="mobile-menu" class="hidden md:hidden pb-4">
      <div class="flex flex-col space-y-3">
        <a
          href="{{ '/blog/' | relative_url }}"
          class="text-base font-normal text-body hover:text-primary transition px-2 py-1"
          >Blog</a
        >
        <a
          href="{{ '/changelog/' | relative_url }}"
          class="text-base font-normal text-body hover:text-primary transition px-2 py-1"
          >What's New</a
        >
        <a
          href="{{ '/about/' | relative_url }}"
          class="text-base font-normal text-body hover:text-primary transition px-2 py-1"
          >About</a
        >
        <a
          href="{{ '/contact/' | relative_url }}"
          class="text-base font-normal text-body hover:text-primary transition px-2 py-1"
          >Support</a
        >
      </div>
    </div>
  </nav>
</header>

<script>
  document.getElementById("menu-toggle").addEventListener("click", function () {
    const menu = document.getElementById("mobile-menu");
    const iconOpen = document.getElementById("menu-icon-open");
    const iconClose = document.getElementById("menu-icon-close");
    menu.classList.toggle("hidden");
    iconOpen.classList.toggle("hidden");
    iconClose.classList.toggle("hidden");
  });
</script>
